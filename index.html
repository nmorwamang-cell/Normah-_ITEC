<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HeyHimani AR Scene - Fixed</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75); color: #fff;
      font-family: Arial, sans-serif; font-size: 14px;
      padding: 10px; z-index: 9999; text-align: center;
    }
  </style>
</head>
<body>

  <div id="status">⏳ Initializing Camera...</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <a-marker preset="hiro" id="hiro-marker">
      
      <a-box
        position="0 0.5 0"
        width="0.6" height="0.6" depth="0.6"
        color="#6C63FF"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
      </a-box>

      <a-torus
        position="0 0.1 0"
        rotation="90 0 0"
        radius="0.5"
        radius-tubular="0.02"
        color="#00E5FF">
      </a-torus>

      <a-text
        value="HeyHimani AR"
        position="0 1.2 0"
        rotation="-90 0 0"
        color="#00E5FF"
        align="center"
        width="4">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const marker = document.querySelector('#hiro-marker');

    // Simple event listeners to confirm it's working
    marker.addEventListener('markerFound', () => {
      statusEl.textContent = '🎯 TARGET ACQUIRED';
      statusEl.style.backgroundColor = 'rgba(0, 180, 100, 0.8)';
    });

    marker.addEventListener('markerLost', () => {
      statusEl.textContent = '🔍 Looking for Hiro Marker...';
      statusEl.style.backgroundColor = 'rgba(0, 0, 0, 0.75)';
    });

    // Handle initial load
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (statusEl.textContent.includes('Initializing')) {
          statusEl.textContent = '🔍 Looking for Hiro Marker...';
        }
      }, 3000);
    });
  </script>
</body>
</html>
